name: Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  tests:
    runs-on: ubuntu-latest

    steps:
      # 1) Получаем код
      - name: Checkout
        uses: actions/checkout@v4

      # 2) Устанавливаем JDK 17 и включаем кэш Maven
      - name: Set up Temurin JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: 'maven'

      # 3) Устанавливаем Node.js (для Allure CLI)
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 4) Ставим Allure CLI глобально
      - name: Install Allure CLI
        run: npm i -g allure-commandline

      # 5) (Опционально) вывод версии Chrome — убедиться, что браузер есть
      - name: Check Chrome version
        run: google-chrome --version || true

      # 6) Запуск тестов (в вашем коде headless читается как -Dheadless=true)
      - name: Run tests (headless)
        run: mvn -B clean test -Dheadless=true
        
      - name: List allure-results
        if: always()
        run: |
          ls -la target || true
          ls -la target/allure-results || true
          echo "count=$(ls -1 target/allure-results/*.json 2>/dev/null | wc -l)"

      # 7) Генерация Allure HTML-отчёта
      - name: Generate Allure Report
        if: always()
        run: |
          allure --version
          allure generate target/allure-results -o target/allure-report --clean

      # 8) Публикуем артефакты — surefire отчёты TestNG
      - name: Upload surefire reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: target/surefire-reports

      # 9) Публикуем артефакты — «сырые» результаты Allure
      - name: Upload allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: target/allure-results

      # 10) Публикуем артефакты — HTML Allure отчёт
      - name: Upload Allure report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: target/allure-report
